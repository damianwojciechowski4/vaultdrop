# cc-host deployment — uses pre-built images from GHCR
# Usage:
#   docker login ghcr.io -u damianwojciechowski4 --password-stdin <<< $GITHUB_TOKEN
#   docker compose pull && docker compose up -d

services:
  discord-bot:
    image: ghcr.io/damianwojciechowski4/vaultdrop-bot:latest
    restart: unless-stopped
    env_file: .env
    environment:
      - PYTHONUNBUFFERED=1
    depends_on:
      - fastapi
    networks:
      - internal

  fastapi:
    image: ghcr.io/damianwojciechowski4/vaultdrop-api:latest
    restart: unless-stopped
    env_file: .env
    volumes:
      - $HOME/vault:/vault
      - $HOME/.claude:/home/vaultdrop/.claude
      - $HOME/.claude.json:/home/vaultdrop/.claude.json
      - $HOME/.gitconfig:/home/vaultdrop/.gitconfig:ro
      - $HOME/.git-credentials:/home/vaultdrop/.git-credentials:ro
      - vaultdrop-data:/data
    networks:
      - internal

networks:
  internal:
    driver: bridge
    ipam:
      config:
        - subnet: 172.34.0.0/24

volumes:
  vaultdrop-data: