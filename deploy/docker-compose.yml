# Vaultdrop Docker Compose Configuration
#
# IMPORTANT: Update the image paths below to match your registry and username
# These images must be built and pushed by your CI/CD pipeline
# See .github/workflows/docker-build.yml for the build configuration
#
# Steps to deploy:
#   1. Fork this repository or set up your own registry
#   2. Update IMAGE_REGISTRY and IMAGE_OWNER variables below
#   3. Ensure your images are built and pushed to your registry
#   4. Run: docker login {IMAGE_REGISTRY} -u {username} --password-stdin <<< $GITHUB_TOKEN
#   5. Run: docker compose pull && docker compose up -d

services:
  discord-bot:
    image: ${IMAGE_REGISTRY:-ghcr.io}/${IMAGE_OWNER:-your-username}/vaultdrop-bot:latest
    restart: unless-stopped
    env_file: .env
    environment:
      - PYTHONUNBUFFERED=1
    depends_on:
      - fastapi
    networks:
      - internal

  fastapi:
    image: ${IMAGE_REGISTRY:-ghcr.io}/${IMAGE_OWNER:-your-username}/vaultdrop-api:latest
    restart: unless-stopped
    env_file: .env
    volumes:
      - $HOME/vault:/vault
      - $HOME/.claude:/home/vaultdrop/.claude
      - $HOME/.claude.json:/home/vaultdrop/.claude.json
      - $HOME/.gitconfig:/home/vaultdrop/.gitconfig:ro
      - $HOME/.git-credentials:/home/vaultdrop/.git-credentials:ro
      - vaultdrop-data:/data
    networks:
      - internal

networks:
  internal:
    driver: bridge
    ipam:
      config:
        - subnet: 172.34.0.0/24

volumes:
  vaultdrop-data: